<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider Ảnh</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        margin-top: 40px;
        background: #f5f5f5;
      }

      .slider {
        width: 800px;
        position: relative;
        overflow: hidden;
        border: 4px solid #000;
        background: #fff;
      }

      .slides {
        display: flex;
        transition: 0.5s;
      }

      .slides img {
        width: 800px;
        height: 450px;
        object-fit: cover;
      }

      /* Nút trái phải */
      .btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 22px;
      }

      .prev {
        left: 10px;
      }

      .next {
        right: 10px;
      }

      /* Dấu chấm */
      .dots {
        text-align: center;
        padding: 15px;
        background: #fff;
      }

      .dot {
        height: 14px;
        width: 14px;
        margin: 0 5px;
        background: #bbb;
        border-radius: 50%;
        display: inline-block;
        cursor: pointer;
      }

      .active {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="slider">
      <!-- Danh sách ảnh -->
      <div class="slides" id="slides">
        <img src="../img/slide_1.jpg" alt="" />
        <img src="../img/slide_2.jpg" alt="" />
        <img src="../img/slide_3.jpg" alt="" />
        <img src="../img/slide_4.jpg" alt="" />
        <img src="../img/slide_5.jpg" alt="" />
      </div>

      <!-- Nút trái phải -->
      <button class="btn prev" onclick="prevSlide()">❮</button>
      <button class="btn next" onclick="nextSlide()">❯</button>

      <!-- Dấu chấm -->
      <div class="dots">
        <span class="dot active" onclick="goToSlide(0)"></span>
        <span class="dot" onclick="goToSlide(1)"></span>
        <span class="dot" onclick="goToSlide(2)"></span>
        <span class="dot" onclick="goToSlide(3)"></span>
        <span class="dot" onclick="goToSlide(4)"></span>
      </div>
    </div>

    <script>
      let currentIndex = 0;

      const slides = document.getElementById("slides");
      const dots = document.querySelectorAll(".dot");

      // Hiển thị slide
      function showSlide(index) {
        // Quay vòng
        if (index < 0) {
          currentIndex = 4;
        } else if (index > 4) {
          currentIndex = 0;
        } else {
          currentIndex = index;
        }

        // Di chuyển ảnh
        slides.style.transform = `translateX(-${currentIndex * 800}px)`;

        // Active dot
        dots.forEach((dot) => dot.classList.remove("active"));
        dots[currentIndex].classList.add("active");
      }

      // Nút next
      function nextSlide() {
        showSlide(currentIndex + 1);
      }

      // Nút prev
      function prevSlide() {
        showSlide(currentIndex - 1);
      }

      // Click dot
      function goToSlide(index) {
        showSlide(index);
      }
    </script>
  </body>
</html>
